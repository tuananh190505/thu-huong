<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Tết 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom,#ff9a9e,#ff4d6d);
    font-family:Arial, sans-serif;
    perspective:1000px;
}

/* Đếm ngược */
#countdown{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    color:white;
    font-weight:bold;
    font-size:18px;
    z-index:5;
}

/* Cây đào */
.tree{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:350px;
    height:450px;
}

.trunk{
    position:absolute;
    bottom:0;
    left:160px;
    width:30px;
    height:220px;
    background:#5c3d2e;
    border-radius:10px;
}

.leaves{
    position:absolute;
    bottom:180px;
    width:350px;
    height:280px;
    background:radial-gradient(circle,pink 40%,#ff69b4);
    border-radius:50%;
    animation:sway 4s infinite alternate ease-in-out;
}

@keyframes sway{
    from{transform:rotate(-2deg);}
    to{transform:rotate(2deg);}
}

/* Lì xì */
.lixi{
    position:absolute;
    width:70px;
    height:100px;
    transform-style:preserve-3d;
    transition:transform 0.6s;
    cursor:pointer;
}

.lixi.open{
    transform:rotateY(180deg);
}

.lixi.locked{
    opacity:0.4;
    pointer-events:none;
}

.card{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
}

.front{
    background:red;
    color:gold;
}

.back{
    background:gold;
    transform:rotateY(180deg);
}

/* Rung */
.shake{
    animation:shake 0.3s;
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:15px;
    z-index:10;
    width:300px;
    text-align:center;
}

.popup button{
    margin:5px;
}

/* Hoa rơi */
.flower{
    position:absolute;
    top:-20px;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation:fall linear infinite;
}

@keyframes fall{
    to{transform:translateY(100vh);}
}

/* Pháo hoa */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

/* Thông báo */
#message{
    position:fixed;
    top:30%;
    width:100%;
    text-align:center;
    font-size:30px;
    color:yellow;
    font-weight:bold;
    display:none;
    z-index:6;
}
</style>
</head>

<body>

<div id="countdown"></div>
<div id="message"></div>
<canvas id="fireworks"></canvas>

<audio id="bgmusic" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="tree">
    <div class="trunk"></div>
    <div class="leaves"></div>

    <div class="lixi" style="top:200px;left:80px"></div>
    <div class="lixi" style="top:150px;left:170px"></div>
    <div class="lixi" style="top:220px;left:230px"></div>
    <div class="lixi" style="top:110px;left:100px"></div>
    <div class="lixi" style="top:140px;left:260px"></div>
</div>

<div class="popup" id="popup">
    <h3 id="question"></h3>
    <div id="answers"></div>
    <button onclick="closePopup()">Đóng</button>
</div>

<script>

/* ======= FIX NHẠC TỰ PHÁT ======= */
document.body.addEventListener("click",()=>{
    document.getElementById("bgmusic").play();
},{once:true});

/* ======= TẠO LÌ XÌ ======= */
document.querySelectorAll(".lixi").forEach((l,i)=>{
    l.innerHTML=`
        <div class="card front">LỘC</div>
        <div class="card back"></div>`;
    l.onclick=()=>clickLixi(l,i);
});

/* ======= HOA RƠI ======= */
for(let i=0;i<40;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=3+Math.random()*5+"s";
    document.body.appendChild(f);
}

/* ======= ĐẾM NGƯỢC ======= */
function updateCountdown(){
    let now=new Date();
    let newYear=new Date(now.getFullYear()+1,0,1);
    let diff=newYear-now;

    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff/(1000*60*60))%24);
    let minutes=Math.floor((diff/1000/60)%60);
    let seconds=Math.floor((diff/1000)%60);

    document.getElementById("countdown").innerText=
    `Đếm ngược: ${days}d ${hours}h ${minutes}m ${seconds}s`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* ======= CÂU HỎI ======= */
const questions=[
{q:"Tết ăn gì?",a:["Bánh chưng","Pizza"],c:0},
{q:"Hoa Tết miền Bắc?",a:["Hoa đào","Hoa cúc"],c:0},
{q:"Màu lì xì?",a:["Đỏ","Đen"],c:0},
{q:"Chúc Tết nói gì?",a:["Chúc mừng năm mới","Bye"],c:0},
{q:"Tết là dịp gì?",a:["Đoàn viên","Đi học"],c:0},
];

function clickLixi(el,index){
    if(el.classList.contains("locked")) return;

    el.classList.add("shake");
    setTimeout(()=>el.classList.remove("shake"),300);
    el.classList.add("open");

    showQuestion(el,index);
}

function showQuestion(el,index){
    let popup=document.getElementById("popup");
    popup.style.display="block";
    document.getElementById("question").innerText=questions[index].q;
    let ans=document.getElementById("answers");
    ans.innerHTML="";
    questions[index].a.forEach((text,i)=>{
        let b=document.createElement("button");
        b.innerText=text;
        b.onclick=()=>checkAnswer(el,index,i);
        ans.appendChild(b);
    });
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function checkAnswer(el,qIndex,aIndex){
    closePopup();
    el.classList.add("locked");

    let msg=document.getElementById("message");
    msg.style.display="block";

    if(aIndex===questions[qIndex].c){
        msg.innerText="🎆 CHÚC MỪNG NĂM MỚI 🎆";
        launchFirework();
    }else{
        msg.innerText="Ahihi đồ ngốc 😆";
    }

    setTimeout(()=>msg.style.display="none",3000);
}

/* ======= PHÁO HOA CHUẨN CANVAS ======= */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

function launchFirework(){
    for(let i=0;i<100;i++){
        particles.push({
            x:canvas.width/2,
            y:canvas.height/2,
            angle:Math.random()*2*Math.PI,
            speed:Math.random()*5+2,
            life:100
        });
    }
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.life--;

        ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
