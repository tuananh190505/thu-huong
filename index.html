<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Game Tết</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#ff758c,#ff3d6d);
}

/* Đếm ngược */
#countdown{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:14px;
    z-index:5;
}

/* Cây đào */
.tree{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:260px;
    height:360px;
}

.trunk{
    position:absolute;
    bottom:0;
    left:115px;
    width:30px;
    height:170px;
    background:linear-gradient(#5c3d2e,#3e2723);
    border-radius:10px;
}

.leaves{
    position:absolute;
    bottom:140px;
    width:260px;
    height:220px;
    background:radial-gradient(circle at 50% 40%,#ffc1e3,#ff69b4);
    border-radius:50%;
    animation:sway 5s infinite alternate ease-in-out;
    box-shadow:0 0 30px rgba(255,105,180,0.6);
}

@keyframes sway{
    from{transform:rotate(-2deg);}
    to{transform:rotate(2deg);}
}

/* Lì xì */
.lixi{
    position:absolute;
    width:55px;
    height:80px;
    transform-style:preserve-3d;
    transition:transform .6s;
}

.lixi.open{
    transform:rotateY(180deg);
}

.lixi.locked{
    opacity:.5;
    pointer-events:none;
}

.card{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:14px;
}

.front{
    background:linear-gradient(#ff0000,#b30000);
    color:gold;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
}

.back{
    background:gold;
    transform:rotateY(180deg);
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:15px;
    border-radius:12px;
    width:85%;
    max-width:300px;
    text-align:center;
    z-index:10;
}

.popup button{
    margin:5px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#ff4d6d;
    color:white;
}

/* Hoa rơi */
.flower{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:.8;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}

/* Pháo hoa */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

/* Thông báo */
#message{
    position:fixed;
    top:30%;
    width:100%;
    text-align:center;
    font-size:22px;
    color:yellow;
    font-weight:bold;
    display:none;
    z-index:6;
    text-shadow:0 0 10px orange;
}
</style>
</head>

<body>

<div id="countdown"></div>
<div id="message"></div>
<canvas id="fireworks"></canvas>

<div class="tree">
    <div class="trunk"></div>
    <div class="leaves"></div>

    <div class="lixi" style="top:180px;left:50px"></div>
    <div class="lixi" style="top:130px;left:130px"></div>
    <div class="lixi" style="top:190px;left:180px"></div>
    <div class="lixi" style="top:100px;left:90px"></div>
    <div class="lixi" style="top:120px;left:200px"></div>
</div>

<div class="popup" id="popup">
    <h4 id="question"></h4>
    <div id="answers"></div>
    <button onclick="closePopup()">Đóng</button>
</div>

<script>

/* ===== HOA RƠI MƯỢT ===== */
for(let i=0;i<25;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=4+Math.random()*6+"s";
    document.body.appendChild(f);
}

/* ===== ĐẾM NGƯỢC ===== */
function updateCountdown(){
    let now=new Date();
    let newYear=new Date(now.getFullYear()+1,0,1);
    let diff=newYear-now;

    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff/(1000*60*60))%24);
    let minutes=Math.floor((diff/1000/60)%60);
    let seconds=Math.floor((diff/1000)%60);

    document.getElementById("countdown").innerText=
    `Còn ${days} ngày ${hours} giờ ${minutes} phút ${seconds} giây đến năm mới`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* ===== LÌ XÌ ===== */
const questions=[
{q:"Tết ăn gì?",a:["Bánh chưng","Pizza"],c:0},
{q:"Hoa Tết miền Bắc?",a:["Hoa đào","Hoa cúc"],c:0},
{q:"Màu lì xì?",a:["Đỏ","Đen"],c:0},
{q:"Chúc Tết nói gì?",a:["Chúc mừng năm mới","Bye"],c:0},
{q:"Tết là dịp gì?",a:["Đoàn viên","Đi học"],c:0},
];

document.querySelectorAll(".lixi").forEach((l,i)=>{
    l.innerHTML=`
        <div class="card front">LỘC</div>
        <div class="card back"></div>`;
    l.onclick=()=>openLixi(l,i);
});

function openLixi(el,index){
    if(el.classList.contains("locked")) return;
    el.classList.add("open");
    showQuestion(el,index);
}

function showQuestion(el,index){
    let popup=document.getElementById("popup");
    popup.style.display="block";
    document.getElementById("question").innerText=questions[index].q;

    let ans=document.getElementById("answers");
    ans.innerHTML="";
    questions[index].a.forEach((text,i)=>{
        let b=document.createElement("button");
        b.innerText=text;
        b.onclick=()=>checkAnswer(el,index,i);
        ans.appendChild(b);
    });
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function checkAnswer(el,qIndex,aIndex){
    closePopup();
    el.classList.add("locked");

    let msg=document.getElementById("message");
    msg.style.display="block";

    if(aIndex===questions[qIndex].c){
        msg.innerText="🎆 CHÚC MỪNG NĂM MỚI 🎆";
        launchFirework();
    }else{
        msg.innerText="Ahihi đồ ngốc 😆";
    }

    setTimeout(()=>msg.style.display="none",2500);
}

/* ===== PHÁO HOA MOBILE MƯỢT ===== */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

function launchFirework(){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height/2;

    for(let i=0;i<60;i++){
        particles.push({
            x:x,
            y:y,
            angle:Math.random()*2*Math.PI,
            speed:Math.random()*4+1,
            life:60
        });
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.1)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.life--;

        ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
