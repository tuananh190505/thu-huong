<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hái Lộc Tri Thức</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    overflow:hidden;
    font-family:Arial, sans-serif;
    background:linear-gradient(to bottom,#f8b6d2,#ff4d6d);
}

/* Đếm ngược */
#countdown{
    position:fixed;
    top:10px;
    width:100%;
    text-align:center;
    color:white;
    font-weight:bold;
    font-size:14px;
    z-index:5;
}

/* Khu vực chính */
.scene{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-end;
}

/* Cây đào */
.tree{
    position:relative;
    width:320px;
    height:420px;
    background:url("tree.jpg") no-repeat center;
    background-size:contain;
}

/* Lì xì */
.lixi{
    position:absolute;
    width:45px;
    height:65px;
    background:linear-gradient(#ff0000,#b30000);
    border-radius:6px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
    font-weight:bold;
    font-size:12px;
    box-shadow:0 4px 10px rgba(0,0,0,.4);
    transition:.3s;
}

.lixi:hover{
    transform:scale(1.1);
}

.lixi.locked{
    opacity:.4;
    pointer-events:none;
}

/* Bảng dưới */
.board{
    width:90%;
    max-width:360px;
    background:linear-gradient(#fff6d5,#ffd27f);
    padding:15px;
    border-radius:15px;
    text-align:center;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(255,215,0,.7);
    font-size:20px;
    font-weight:bold;
    color:#b30000;
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:15px;
    border-radius:12px;
    width:85%;
    max-width:300px;
    text-align:center;
    z-index:10;
}

.popup button{
    margin:5px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    background:#ff4d6d;
    color:white;
}

/* Hoa rơi */
.flower{
    position:absolute;
    width:6px;
    height:6px;
    background:white;
    border-radius:50%;
    opacity:.8;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-10px);}
    to{transform:translateY(100vh);}
}

/* Pháo hoa */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

/* Thông báo */
#message{
    position:fixed;
    top:35%;
    width:100%;
    text-align:center;
    font-size:22px;
    color:yellow;
    font-weight:bold;
    display:none;
    z-index:6;
    text-shadow:0 0 10px orange;
}
</style>
</head>

<body>

<div id="countdown"></div>
<div id="message"></div>
<canvas id="fireworks"></canvas>

<div class="scene">

    <div class="tree" id="tree">
        <!-- Lì xì sẽ tạo bằng JS -->
    </div>

    <div class="board">
        🌸 HÁI LỘC TRI THỨC 🌸
    </div>

</div>

<div class="popup" id="popup">
    <h4 id="question"></h4>
    <div id="answers"></div>
    <button onclick="closePopup()">Đóng</button>
</div>

<script>

/* Hoa rơi */
for(let i=0;i<25;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=4+Math.random()*6+"s";
    document.body.appendChild(f);
}

/* Đếm ngược */
function updateCountdown(){
    let now=new Date();
    let newYear=new Date(now.getFullYear()+1,0,1);
    let diff=newYear-now;
    let days=Math.floor(diff/(1000*60*60*24));
    let hours=Math.floor((diff/(1000*60*60))%24);
    let minutes=Math.floor((diff/1000/60)%60);
    let seconds=Math.floor((diff/1000)%60);
    document.getElementById("countdown").innerText=
    `Còn ${days} ngày ${hours} giờ ${minutes} phút ${seconds} giây đến năm mới`;
}
setInterval(updateCountdown,1000);
updateCountdown();

/* Câu hỏi */
const questions=[
{q:"Tết ăn gì?",a:["Bánh chưng","Pizza"],c:0},
{q:"Hoa Tết miền Bắc?",a:["Hoa đào","Hoa cúc"],c:0},
{q:"Màu lì xì?",a:["Đỏ","Đen"],c:0},
{q:"Chúc Tết nói gì?",a:["Chúc mừng năm mới","Bye"],c:0},
{q:"Tết là dịp gì?",a:["Đoàn viên","Đi học"],c:0},
];

/* Tạo lì xì rải ngẫu nhiên */
let tree=document.getElementById("tree");

questions.forEach((q,index)=>{
    let l=document.createElement("div");
    l.className="lixi";
    l.innerText="LỘC";
    l.style.top=(50+Math.random()*250)+"px";
    l.style.left=(20+Math.random()*260)+"px";
    l.onclick=()=>openQuestion(l,index);
    tree.appendChild(l);
});

function openQuestion(el,index){
    if(el.classList.contains("locked")) return;
    showQuestion(el,index);
}

function showQuestion(el,index){
    let popup=document.getElementById("popup");
    popup.style.display="block";
    document.getElementById("question").innerText=questions[index].q;

    let ans=document.getElementById("answers");
    ans.innerHTML="";
    questions[index].a.forEach((text,i)=>{
        let b=document.createElement("button");
        b.innerText=text;
        b.onclick=()=>checkAnswer(el,index,i);
        ans.appendChild(b);
    });
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

function checkAnswer(el,qIndex,aIndex){
    closePopup();
    el.classList.add("locked");

    let msg=document.getElementById("message");
    msg.style.display="block";

    if(aIndex===questions[qIndex].c){
        msg.innerText="🎆 CHÚC MỪNG NĂM MỚI 🎆";
        launchFirework();
    }else{
        msg.innerText="Ahihi đồ ngốc 😆";
    }

    setTimeout(()=>msg.style.display="none",2500);
}

/* Pháo hoa */
const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let particles=[];

function launchFirework(){
    let x=Math.random()*canvas.width;
    let y=Math.random()*canvas.height/2;

    for(let i=0;i<70;i++){
        particles.push({
            x:x,
            y:y,
            angle:Math.random()*2*Math.PI,
            speed:Math.random()*4+1,
            life:60
        });
    }
}

function animate(){
    ctx.fillStyle="rgba(0,0,0,0.08)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    particles.forEach((p,i)=>{
        p.x+=Math.cos(p.angle)*p.speed;
        p.y+=Math.sin(p.angle)*p.speed;
        p.life--;

        ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
        ctx.fillRect(p.x,p.y,3,3);

        if(p.life<=0) particles.splice(i,1);
    });

    requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
