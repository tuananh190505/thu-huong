<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Mini Game Tết 3D</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:linear-gradient(to bottom,#ff9a9e,#ff4d6d);
    font-family:sans-serif;
    perspective:1000px;
}

/* Đếm ngược */
#countdown{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    font-size:22px;
    color:white;
    font-weight:bold;
}

/* Cây đào 3D */
.tree{
    position:absolute;
    bottom:0;
    left:50%;
    transform:translateX(-50%) rotateX(10deg);
    width:350px;
    height:450px;
}

.trunk{
    position:absolute;
    bottom:0;
    left:160px;
    width:30px;
    height:220px;
    background:#5c3d2e;
    border-radius:10px;
}

.leaves{
    position:absolute;
    bottom:180px;
    width:350px;
    height:280px;
    background:radial-gradient(circle,pink 40%,#ff69b4);
    border-radius:50%;
    animation:sway 4s infinite alternate ease-in-out;
}

@keyframes sway{
    from{transform:rotate(-2deg);}
    to{transform:rotate(2deg);}
}

/* Lì xì */
.lixi{
    position:absolute;
    width:70px;
    height:100px;
    transform-style:preserve-3d;
    transition:transform 0.6s;
    cursor:pointer;
}

.lixi.open{
    transform:rotateY(180deg);
}

.lixi.locked{
    opacity:0.4;
    pointer-events:none;
}

.card{
    position:absolute;
    width:100%;
    height:100%;
    backface-visibility:hidden;
    border-radius:10px;
}

.front{
    background:red;
    display:flex;
    align-items:center;
    justify-content:center;
    color:gold;
    font-weight:bold;
    font-size:20px;
}

.back{
    background:gold;
    transform:rotateY(180deg);
}

/* Rung */
.shake{
    animation:shake 0.3s;
}
@keyframes shake{
    0%{transform:translateX(0);}
    25%{transform:translateX(-5px);}
    50%{transform:translateX(5px);}
    75%{transform:translateX(-5px);}
    100%{transform:translateX(0);}
}

/* Popup */
.popup{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    padding:20px;
    border-radius:15px;
    z-index:10;
}

button{
    margin:5px;
    padding:6px 12px;
}

/* Pháo hoa canvas */
canvas{
    position:fixed;
    top:0;
    left:0;
    pointer-events:none;
}

/* Hoa rơi */
.flower{
    position:absolute;
    top:-20px;
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    animation:fall linear infinite;
}
@keyframes fall{
    to{transform:translateY(100vh);}
}

#message{
    position:fixed;
    top:30%;
    width:100%;
    text-align:center;
    font-size:35px;
    color:yellow;
    font-weight:bold;
    display:none;
}
</style>
</head>

<body>

<div id="countdown"></div>
<div id="message"></div>
<canvas id="fireworks"></canvas>

<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<div class="tree">
    <div class="trunk"></div>
    <div class="leaves"></div>

    <div class="lixi" style="top:200px;left:80px" onclick="clickLixi(this,0)"></div>
    <div class="lixi" style="top:150px;left:170px" onclick="clickLixi(this,1)"></div>
    <div class="lixi" style="top:220px;left:230px" onclick="clickLixi(this,2)"></div>
    <div class="lixi" style="top:110px;left:100px" onclick="clickLixi(this,3)"></div>
    <div class="lixi" style="top:140px;left:260px" onclick="clickLixi(this,4)"></div>
</div>

<div class="popup" id="popup">
    <h3 id="question"></h3>
    <div id="answers"></div>
</div>

<script>
// Tạo mặt trước sau cho lì xì
document.querySelectorAll(".lixi").forEach(l=>{
    l.innerHTML=`<div class="card front">LỘC</div>
                 <div class="card back"></div>`;
});

// Hoa rơi
for(let i=0;i<40;i++){
    let f=document.createElement("div");
    f.className="flower";
    f.style.left=Math.random()*100+"vw";
    f.style.animationDuration=3+Math.random()*5+"s";
    document.body.appendChild(f);
}

// Đếm ngược
function countdown(){
    let now=new Date();
    let newYear=new Date(now.getFullYear()+1,0,1);
    let diff=newYear-now;
    let d=Math.floor(diff/1000);
    document.getElementById("countdown").innerText=
    "Đếm ngược năm mới: "+d+" giây";
}
setInterval(countdown,1000);

// Câu hỏi
const questions=[
{q:"Tết ăn gì?",a:["Bánh chưng","Pizza"],c:0},
{q:"Hoa Tết miền Bắc?",a:["Hoa đào","Hoa cúc"],c:0},
{q:"Màu lì xì?",a:["Đỏ","Đen"],c:0},
{q:"Chúc Tết nói gì?",a:["Chúc mừng năm mới","Bye"],c:0},
{q:"Tết là dịp gì?",a:["Đoàn viên","Đi học"],c:0},
];

function clickLixi(el,index){
    if(el.classList.contains("locked")) return;

    el.classList.add("shake");
    setTimeout(()=>el.classList.remove("shake"),300);
    el.classList.add("open");

    showQuestion(el,index);
}

function showQuestion(el,index){
    let p=document.getElementById("popup");
    p.style.display="block";
    document.getElementById("question").innerText=questions[index].q;
    let ans=document.getElementById("answers");
    ans.innerHTML="";
    questions[index].a.forEach((a,i)=>{
        let b=document.createElement("button");
        b.innerText=a;
        b.onclick=()=>checkAnswer(el,index,i);
        ans.appendChild(b);
    });
}

function checkAnswer(el,qIndex,aIndex){
    document.getElementById("popup").style.display="none";
    el.classList.add("locked");

    let msg=document.getElementById("message");
    msg.style.display="block";

    if(aIndex===questions[qIndex].c){
        msg.innerText="🎆 CHÚC MỪNG NĂM MỚI 🎆";
        startFireworks();
    }else{
        msg.innerText="Ahihi đồ ngốc 😆";
    }

    setTimeout(()=>msg.style.display="none",3000);
}

// PHÁO HOA CANVAS
let canvas=document.getElementById("fireworks");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

function startFireworks(){
    for(let i=0;i<20;i++){
        let x=Math.random()*canvas.width;
        let y=Math.random()*canvas.height/2;
        explode(x,y);
    }
}

function explode(x,y){
    for(let i=0;i<50;i++){
        let angle=Math.random()*2*Math.PI;
        let speed=Math.random()*4;
        let dx=Math.cos(angle)*speed;
        let dy=Math.sin(angle)*speed;
        let life=50;

        let particle=setInterval(()=>{
            ctx.fillStyle="hsl("+Math.random()*360+",100%,50%)";
            ctx.fillRect(x,y,3,3);
            x+=dx;
            y+=dy;
            life--;
            if(life<=0) clearInterval(particle);
        },20);
    }
}
</script>

</body>
</html>
